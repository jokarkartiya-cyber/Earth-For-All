openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Earth For All API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ideas
    description: Community ideas
  - name: reports
    description: Problem reports
  - name: articles
    description: Educational articles
  - name: stats
    description: Platform statistics
  - name: discussions
    description: Community discussions
  - name: air-quality
    description: Air quality data
  - name: species
    description: Animal species database
  - name: forest
    description: Forest data
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get platform-wide stats
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /ideas:
    get:
      operationId: listIdeas
      tags: [ideas]
      summary: List community ideas
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of ideas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Idea"
    post:
      operationId: createIdea
      tags: [ideas]
      summary: Submit a new idea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdeaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"

  /ideas/{id}/upvote:
    post:
      operationId: upvoteIdea
      tags: [ideas]
      summary: Upvote an idea
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated idea
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List problem reports
      parameters:
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
    post:
      operationId: createReport
      tags: [reports]
      summary: Submit a problem report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"

  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List educational articles
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"

  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get a single article
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found

  /ideas/recent:
    get:
      operationId: getRecentIdeas
      tags: [ideas]
      summary: Get recent ideas across all categories
      responses:
        "200":
          description: Recent ideas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Idea"

  /reports/recent:
    get:
      operationId: getRecentReports
      tags: [reports]
      summary: Get recent problem reports
      responses:
        "200":
          description: Recent reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"

  /discussions:
    get:
      operationId: listDiscussions
      tags: [discussions]
      summary: List community discussions
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of discussions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Discussion"
    post:
      operationId: createDiscussion
      tags: [discussions]
      summary: Post a new discussion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscussionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"

  /discussions/{id}/upvote:
    post:
      operationId: upvoteDiscussion
      tags: [discussions]
      summary: Upvote a discussion
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated discussion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"

  /air-quality:
    get:
      operationId: listAirQuality
      tags: [air-quality]
      summary: List air quality data for cities
      parameters:
        - in: query
          name: country
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Air quality data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AirQuality"

  /species:
    get:
      operationId: listSpecies
      tags: [species]
      summary: List animal species
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Animal species list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnimalSpecies"

  /forest-data:
    get:
      operationId: listForestData
      tags: [forest]
      summary: List forest data by country
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Forest data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForestData"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    PlatformStats:
      type: object
      required: [totalIdeas, totalReports, totalArticles, ideasByCategory, reportsByType]
      properties:
        totalIdeas:
          type: integer
        totalReports:
          type: integer
        totalArticles:
          type: integer
        totalDiscussions:
          type: integer
        totalSpecies:
          type: integer
        ideasByCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        reportsByType:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"

    CategoryCount:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer

    Idea:
      type: object
      required: [id, title, description, category, authorName, upvotes, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
          description: "clean-earth | animal-welfare | forest | water | technology | cities"
        authorName:
          type: string
        upvotes:
          type: integer
        createdAt:
          type: string
          format: date-time

    IdeaInput:
      type: object
      required: [title, description, category, authorName]
      properties:
        title:
          type: string
          minLength: 5
        description:
          type: string
          minLength: 10
        category:
          type: string
        authorName:
          type: string

    Report:
      type: object
      required: [id, type, description, location, status, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          description: "pollution | animal-emergency | tree-cutting | water-pollution | garbage"
        description:
          type: string
        location:
          type: string
        status:
          type: string
          description: "pending | in-progress | resolved"
        creporterName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ReportInput:
      type: object
      required: [type, description, location]
      properties:
        type:
          type: string
        description:
          type: string
          minLength: 10
        location:
          type: string
        reporterName:
          type: string

    Article:
      type: object
      required: [id, title, summary, category, readingTimeMinutes, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        summary:
          type: string
        content:
          type: ["string", "null"]
        category:
          type: string
          description: "clean-earth | animal-welfare | forest | water | technology | future-cities"
        readingTimeMinutes:
          type: integer
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    Discussion:
      type: object
      required: [id, topic, message, authorName, category, upvotes, createdAt]
      properties:
        id:
          type: integer
        topic:
          type: string
        message:
          type: string
        authorName:
          type: string
        category:
          type: string
        upvotes:
          type: integer
        createdAt:
          type: string
          format: date-time

    DiscussionInput:
      type: object
      required: [topic, message, authorName, category]
      properties:
        topic:
          type: string
          minLength: 5
        message:
          type: string
          minLength: 10
        authorName:
          type: string
        category:
          type: string

    AirQuality:
      type: object
      required: [id, city, country, aqi, status, updatedAt]
      properties:
        id:
          type: integer
        city:
          type: string
        country:
          type: string
        aqi:
          type: integer
        pm25:
          type: ["number", "null"]
        pm10:
          type: ["number", "null"]
        no2:
          type: ["number", "null"]
        o3:
          type: ["number", "null"]
        status:
          type: string
          description: "Good | Moderate | Unhealthy | Very Unhealthy | Hazardous"
        updatedAt:
          type: string
          format: date-time

    AnimalSpecies:
      type: object
      required: [id, speciesName, status, createdAt]
      properties:
        id:
          type: integer
        speciesName:
          type: string
        scientificName:
          type: ["string", "null"]
        status:
          type: string
          description: "Extinct | Critically Endangered | Endangered | Vulnerable | Near Threatened | Least Concern"
        habitat:
          type: ["string", "null"]
        population:
          type: ["string", "null"]
        threats:
          type: ["string", "null"]
        protectionMethods:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ForestData:
      type: object
      required: [id, country, forestAreaMha, year, createdAt]
      properties:
        id:
          type: integer
        country:
          type: string
        forestAreaMha:
          type: number
        forestLossMha:
          type: ["number", "null"]
        treeCanopyCover:
          type: ["number", "null"]
        year:
          type: integer
        carbonStockMt:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time
