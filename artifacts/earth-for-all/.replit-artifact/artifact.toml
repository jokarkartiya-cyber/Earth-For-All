kind = "web"
previewPath = "/"
title = "Earth For All"
version = "1.0.0"
id = "artifacts/earth-for-all"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19884

[services.development]
run = "pnpm --filter @workspace/earth-for-all run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/earth-for-all", "run", "build" ]
publicDir = "artifacts/earth-for-all/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19884"
BASE_PATH = "/"
